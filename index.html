    + '<p id="loginErr" class="text-[.85rem] text-red-300/90 '+(msg?'':'hidden')+'">'+(msg||'')+'</p>'
    + '<button type="submit" id="loginBtn" class="w-full bg-gold hover:bg-gold-light text-ink-900 font-medium text-[.92rem] px-6 py-3 rounded-full transition-colors">Sign in</button></form></div>'
    + '<div class="mt-6 text-center"><a href="#top" class="text-[.82rem] text-bone/45 hover:text-bone/70">← Back to site</a></div></div></div>';
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault(); var fd=new FormData(e.target); var btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent='Signing in…';
      sb.auth.signInWithPassword({ email:(fd.get('email')||'').toString().trim(), password:(fd.get('password')||'').toString() }).then(function(r){
        if(r.error){ renderLogin('Incorrect email or password.'); } else { renderDashboard(); }
      });
    });
  }

  function renderDashboard(){
    app.innerHTML='<div class="min-h-screen"><header class="border-b border-white/[.07] bg-ink-900/70 sticky top-0 z-10 backdrop-blur-md"><div class="mx-auto max-w-6xl px-6 py-4 flex items-center justify-between"><div class="flex items-center gap-5">'
    + '<svg width="30" height="34" viewBox="0 0 30 34" fill="none"><path d="M15 7 L23.7 12 L15 17 Z" fill="#CBA968"/><path d="M15 7 L6.3 12 L15 17 Z" fill="#B5904E"/><path d="M15 17 L23.7 12 V22 L15 27 Z" fill="#8F6F35"/><path d="M15 17 L6.3 12 V22 L15 27 Z" fill="#9A7B3E"/></svg>'
    + '<div><h1 class="font-display text-lg leading-none">Leads</h1><p class="text-[.72rem] text-bone/45 mt-1">Gogobe Investments · admin</p></div></div>'
    + '<div class="flex items-center gap-3"><a href="#top" class="text-[.82rem] text-bone/55 hover:text-bone hidden sm:inline">View site</a><button id="signOut" class="text-[.82rem] text-bone/70 border border-white/[.1] hover:border-gold/40 rounded-full px-4 py-2 transition-colors">Sign out</button></div></div></header>'
    + '<main class="mx-auto max-w-6xl px-6 py-10"><div class="flex flex-col md:flex-row md:items-center md:justify-between gap-5 mb-7"><div id="filters" class="flex flex-wrap gap-2"></div><div class="flex items-center gap-3"><input id="search" placeholder="Search name, email, message…" class="w-full md:w-64 bg-ink-900/60 border border-white/[.09] rounded-lg px-4 py-2.5 text-[.9rem] text-bone outline-none focus:border-gold/60"><button id="exportBtn" class="shrink-0 text-[.82rem] bg-gold hover:bg-gold-light text-ink-900 font-medium rounded-full px-4 py-2.5 transition-colors">Export CSV</button></div></div><div id="tableWrap"><p class="text-bone/50 py-16 text-center">Loading leads…</p></div><p id="countLine" class="mt-6 text-[.78rem] text-bone/35"></p></main></div>';

    document.getElementById('signOut').addEventListener('click', function(){ sb.auth.signOut().then(function(){ renderLogin(); }); });

    var state={ leads:[], filter:'all', query:'' };

    function draw(){
      var counts={ all: state.leads.length };
      state.leads.forEach(function(l){ counts[l.interest]=(counts[l.interest]||0)+1; });
      var fkeys=['all','general','mining','software','partnership'];
      document.getElementById('filters').innerHTML=fkeys.map(function(f){
        var on=state.filter===f;
        return '<button data-f="'+f+'" class="fbtn text-[.8rem] px-4 py-2 rounded-full border transition-colors '+(on?'border-gold/60 bg-gold/10 text-gold':'border-white/[.1] text-bone/60 hover:text-bone')+'">'+(f==='all'?'All':interestLabels[f])+' <span class="ml-2 text-bone/35">'+(counts[f]||0)+'</span></button>';
      }).join('');
      document.querySelectorAll('.fbtn').forEach(function(b){ b.addEventListener('click', function(){ state.filter=b.getAttribute('data-f'); draw(); }); });

      var q=state.query.trim().toLowerCase();
      var rows=state.leads.filter(function(l){
        var mf=state.filter==='all'||l.interest===state.filter;
        var mq=!q||l.email.toLowerCase().indexOf(q)>=0||(l.name||'').toLowerCase().indexOf(q)>=0||(l.message||'').toLowerCase().indexOf(q)>=0;
        return mf&&mq;
      });

      var wrap=document.getElementById('tableWrap');
      if(rows.length===0){
        wrap.innerHTML='<div class="rounded-2xl border border-white/[.08] bg-ink-700/30 p-16 text-center"><p class="font-display text-2xl mb-2">No leads yet</p><p class="text-bone/50 text-[.9rem]">'+(state.leads.length===0?'Submissions from the website will appear here.':'No leads match your current filters.')+'</p></div>';
      } else {
        var trs=rows.map(function(l){
          var d=new Date(l.created_at).toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'});
          return '<tr class="hover:bg-ink-700/30 transition-colors align-top"><td class="px-5 py-4"><div class="text-[.92rem] text-bone">'+esc(l.name||'—')+'</div><a href="mailto:'+esc(l.email)+'" class="text-[.82rem] text-gold hover:text-gold-light">'+esc(l.email)+'</a></td>'
          + '<td class="px-5 py-4 hidden sm:table-cell"><span class="text-[.78rem] border border-white/[.12] rounded-full px-3 py-1 text-bone/70 whitespace-nowrap">'+(interestLabels[l.interest]||l.interest)+'</span></td>'
          + '<td class="px-5 py-4 hidden lg:table-cell max-w-xs"><p class="text-[.85rem] text-bone/55">'+esc(l.message||'—')+'</p></td>'
          + '<td class="px-5 py-4 text-[.82rem] text-bone/50 whitespace-nowrap">'+d+'</td>'
          + '<td class="px-5 py-4 text-right"><button data-id="'+l.id+'" class="delBtn text-bone/35 hover:text-red-300 transition-colors p-1" aria-label="Delete"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14" stroke-linecap="round" stroke-linejoin="round"/></svg></button></td></tr>';
        }).join('');
        wrap.innerHTML='<div class="overflow-hidden rounded-2xl border border-white/[.08]"><table class="w-full text-left border-collapse"><thead><tr class="bg-ink-900/50 text-[.72rem] uppercase tracking-wide text-bone/45"><th class="px-5 py-4 font-medium">Contact</th><th class="px-5 py-4 font-medium hidden sm:table-cell">Interest</th><th class="px-5 py-4 font-medium hidden lg:table-cell">Message</th><th class="px-5 py-4 font-medium">Date</th><th class="px-5 py-4"></th></tr></thead><tbody class="divide-y divide-white/[.06]">'+trs+'</tbody></table></div>';
        document.querySelectorAll('.delBtn').forEach(function(b){ b.addEventListener('click', function(){ var id=b.getAttribute('data-id'); if(!confirm('Delete this lead? This cannot be undone.'))return; sb.from('leads').delete().eq('id',id).then(function(r){ if(r.error){ alert('Could not delete: '+r.error.message); } else { state.leads=state.leads.filter(function(x){return x.id!==id;}); draw(); } }); }); });
      }
      document.getElementById('countLine').textContent='Showing '+rows.length+' of '+state.leads.length+' total '+(state.leads.length===1?'lead':'leads')+'.';
      window._rows=rows;
    }

    document.getElementById('search').addEventListener('input', function(e){ state.query=e.target.value; draw(); });
    document.getElementById('exportBtn').addEventListener('click', function(){
      var rows=window._rows||[]; var header=['Name','Email','Interest','Message','Source','Date'];
      var data=rows.map(function(l){ return [l.name||'', l.email, interestLabels[l.interest]||l.interest, (l.message||'').replace(/\n/g,' '), l.source||'', new Date(l.created_at).toISOString()]; });
      var csv=[header].concat(data).map(function(r){ return r.map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
      var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}); var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download='gogobe-leads-'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); URL.revokeObjectURL(url);
    });

    sb.from('leads').select('*').order('created_at',{ascending:false}).then(function(r){
      if(r.error){ document.getElementById('tableWrap').innerHTML='<div class="rounded-xl border border-red-400/20 bg-red-500/5 p-6 text-red-200/80 text-[.9rem]">'+esc(r.error.message)+'</div>'; return; }
      state.leads=r.data||[]; draw();
    });
  }

  // ------------------------------------------------------------- TEAM
  var MEMBERS = [
    {
      name: 'K Munjeri',
      title: 'Director',
      bio: '15 years in investment management, with interests in mining and technology across software development and AI.',
      email: 'K.Munjeri@gogobeinvestments.com',
      phone: '+263 78 992 7486',
      linkedin: '',
      photo: '/kmunjeri.jpg'
    },
    {
      name: 'B D Chikavanga',
      title: 'Director',
      bio: '10 years in advanced financial-services IT consulting and 15 years in mining investments and site development.',
      email: 'B.Chikavanga@gogobeinvestments.com',
      phone: '+263 77 241 8661',
      linkedin: '',
      photo: '/chikavanga.jpg'
    }
  ];

  function memberCard(m){
    var initials = m.name.split(/\s+/).filter(Boolean).map(function(p){ return p[0]; }).slice(0, 2).join('').toUpperCase();
    var pic = '<div class="relative aspect-[4/5] w-full overflow-hidden rounded-xl border border-white/[.08] bg-gradient-to-b from-ink-600 to-ink-700">'
      + '<span class="absolute inset-0 flex items-center justify-center font-display text-6xl text-gold/60">' + initials + '</span>'
      + (m.photo ? '<img src="' + esc(m.photo) + '" alt="' + esc(m.name) + '" class="relative h-full w-full object-cover object-top" loading="lazy" onerror="this.remove()">' : '')
      + '</div>';
    var bio = m.bio ? '<p class="mt-3 text-[.9rem] leading-relaxed text-bone/60">' + esc(m.bio) + '</p>' : '';
    var contact = '';
    if (m.email) contact += '<a href="mailto:' + esc(m.email) + '" class="flex items-center gap-2 text-[.85rem] text-gold hover:text-gold-light transition-colors break-all"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>' + esc(m.email) + '</a>';
    if (m.phone) contact += '<a href="tel:' + esc(m.phone.replace(/\s+/g, '')) + '" class="flex items-center gap-2 text-[.85rem] text-bone/65 hover:text-bone transition-colors"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2 4.2 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L8 9.5a16 16 0 0 0 6 6l1.1-1.1a2 2 0 0 1 2.1-.5c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 2Z"/></svg>' + esc(m.phone) + '</a>';
    if (m.linkedin) contact += '<a href="' + esc(m.linkedin) + '" target="_blank" rel="noopener" class="flex items-center gap-2 text-[.85rem] text-bone/65 hover:text-bone transition-colors"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28ZM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14ZM7.12 20.45H3.55V9h3.57v11.45ZM22.22 0H1.77C.8 0 0 .78 0 1.75v20.5C0 23.2.8 24 1.77 24h20.45c.98 0 1.78-.8 1.78-1.75V1.75C24 .78 23.2 0 22.22 0Z"/></svg>LinkedIn</a>';
    var contactBlock = contact ? '<div class="mt-4 space-y-2">' + contact + '</div>' : '';
    return '<article class="reveal">' + pic
      + '<h3 class="mt-6 font-display text-2xl">' + esc(m.name) + '</h3>'
      + '<p class="eyebrow text-gold mt-2">' + esc(m.title) + '</p>'
      + bio + contactBlock
      + '</article>';
  }

  function renderTeam(){
    var cards = MEMBERS.map(memberCard).join('');
    app.innerHTML = navHTML()
      + '<section class="pt-40 pb-16 md:pt-48 md:pb-20"><div class="mx-auto max-w-content px-6 md:px-10">'
      +   '<p class="eyebrow text-gold mb-6 reveal">Our Team</p>'
      +   '<h1 class="font-display text-[2.4rem] md:text-6xl leading-[1.02] max-w-3xl reveal">The people behind Gogobe.</h1>'
      +   '<p class="mt-7 max-w-xl text-[1.02rem] leading-relaxed text-bone/70 reveal">A team that pairs deep investment discipline with hands-on operating experience across mining, resources, and technology.</p>'
      + '</div></section>'
      + '<section class="pb-28 md:pb-36"><div class="mx-auto max-w-content px-6 md:px-10"><div class="grid gap-x-12 gap-y-16 sm:grid-cols-2 max-w-3xl">' + cards + '</div></div></section>'
      + footerHTML();
    wireNav();
    observeReveals();
  }

  // ------------------------------------------------------------- ROUTER
  function route(){
    var h=(location.hash||'').replace('#','');
    if(h==='admin'){ window.onscroll=null; renderAdmin(); window.scrollTo(0,0); }
    else if(h==='team'){ window.onscroll=null; renderTeam(); window.scrollTo(0,0); }
    else { renderHome(); if(h && h!=='top'){ var el=document.getElementById(h); if(el){ setTimeout(function(){ el.scrollIntoView(); },50); } } }
  }
  window.addEventListener('hashchange', route);
  route();
})();
</script>
</body>
</html>
